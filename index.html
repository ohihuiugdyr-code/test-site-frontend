<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body { 
            margin: 0;
            padding: 0;
    background:#1d1d1d;
    font-family:Arial, Helvetica, sans-serif;
        }



    .container__main { 
   
    }


  .header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
    height:70px;
    padding:0 30px;
    box-sizing:border-box;
    background:#2b2b2b;
    box-shadow:0 4px 15px rgba(0,0,0,.4);
}


  .nav__header{
    display:flex;
    gap:25px;
    padding:10px 20px;
    border:1px solid #555;
    border-radius:30px;
    background:#363636;
}

    .nav__header a{
        color:#f0f0f0;
        text-decoration:none;
        font-size:15px;
        transition:.3s;
    }

    .nav__header a:hover{
        color:#3da9fc;
    }
            


    .logo__header{
        width:45px;
        height:45px;
        border-radius:50%;

    }

    .header button{
        width:95px;
        height:40px;
        border:none;
        border-radius:30px;
        background:#3da9fc;
        color:white;
        font-size:15px;
        cursor:pointer;
        transition:.3s;
    }

    .header button:hover{
        background:#1d8ceb;
        transform:scale(1.05);
    }

              .header button:hover { 
            color: rgb(222, 222, 222);
            background-color: rgb(68, 68, 68);

            
        }

            .main  {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .img_main {
        width: 700px;
        height: 400px;
    }

@media (max-width:  768px) {

    .header {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        gap: 11px;
    }
    
    .logo__header {
        width: 42px;
        height: 42px;
        
    }

        .header button:hover{
        background:#1d8ceb;
        transform:scale(1.05);
    }
    .nav__header {
        width: 200px;
        height: 20px;

    }
    .header button {
            display: flex;
    justify-content: center;
    align-items: center;
        width: 90px;
        height: 42px;
        font-size: 20px;
    }
    .main  {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .img_main {
        width: 300px;
        height: 200px;
    }
}


    </style>
</head>
<body>
    <main class="container__main">
    
        <div class="header">
            <img class="logo__header" src="../images/logo.png" alt="лого">
            <div class="nav__header">
            <a href="">Главная</a>
            <a href="">Новости</a>
            <a href="">About</a>
            </div>
            <button>войти</button>
        </div>

        <div class="main">
            <img class="img_main" src="..//images/line-chat.png" alt="">
        </div>

    </main>
</body>
</html>
